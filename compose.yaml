name: plex-stack

networks:
  home-network:
    driver: bridge

services:
  # ─── Media Server ──────────────────────────────────────────────────────────
  plex:
    image: lscr.io/linuxserver/plex:latest
    container_name: plex
    networks:
      - home-network
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/Sao_Paulo}
      - VERSION=docker
      - PLEX_CLAIM=${PLEX_CLAIM}
    volumes:
      - ./config/plex:/config
      - ./media/movies:/movies
      - ./media/tv:/tv
    ports:
      - "32400:32400"
    restart: unless-stopped

  # ─── Request UI ────────────────────────────────────────────────────────────
  overseerr:
    image: lscr.io/linuxserver/overseerr:latest
    container_name: overseerr
    networks:
      - home-network
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/Sao_Paulo}
    volumes:
      - ./config/overseerr:/config
    ports:
      - "5055:5055"
    restart: unless-stopped

  # ─── Movie Automation ──────────────────────────────────────────────────────
  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    networks:
      - home-network
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/Sao_Paulo}
    volumes:
      - ./config/radarr:/config
      - ./media:/data
    ports:
      - "7878:7878"
    restart: unless-stopped

  # ─── TV Show Automation ────────────────────────────────────────────────────
  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    networks:
      - home-network
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/Sao_Paulo}
    volumes:
      - ./config/sonarr:/config
      - ./media:/data
    ports:
      - "8989:8989"
    restart: unless-stopped

  # ─── Indexer Aggregator ────────────────────────────────────────────────────
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    networks:
      - home-network
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/Sao_Paulo}
    volumes:
      - ./config/prowlarr:/config
    ports:
      - "9696:9696"
    restart: unless-stopped

  # ─── Torrent Client ────────────────────────────────────────────────────────
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    networks:
      - home-network
    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
      - TZ=${TZ:-America/Sao_Paulo}
      - WEBUI_PORT=8090
    volumes:
      - ./config/qbittorrent:/config
      - ./media:/data
    ports:
      - "8090:8090"
      - "6881:6881"
      - "6881:6881/udp"
    restart: unless-stopped